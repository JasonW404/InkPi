name: CI
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Compile check
        run: uv run python -m compileall -q inkpi tests
      - name: Unit tests
        run: uv run pytest -q
      - name: Preview render
        run: |
          mkdir -p tmp
          uv run inkpi-preview overview --mock-data --output tmp/overview.png

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check inkpi tests
      - name: Ruff format check
        run: uv run ruff format --check inkpi tests

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - name: Smoke test
        run: bash scripts/smoke_test.sh
